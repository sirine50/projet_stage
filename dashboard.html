<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - ERP Pro</title>
    <link rel="stylesheet" href="clients.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <span><i class="fa-solid fa-cubes"></i> ERP Pro</span>
        </div>
        <ul class="sidebar-menu">
            <li class="active"><a href="#"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></a></li>
            <li><a href="clients.html"><i class="fa-solid fa-users"></i><span>Clients</span></a></li>
            <li><a href="#"><i class="fa-solid fa-box-open"></i><span>Produits</span></a></li>
            <li><a href="#"><i class="fa-solid fa-cart-shopping"></i><span>Commandes</span></a></li>
            <li><a href="#"><i class="fa-solid fa-truck"></i><span>Livraisons</span></a></li>
        </ul>
    </div>

    <main class="main">

        <div class="page-header">
            <div>
                <h1>Tableau de bord</h1>
                <p id="dashboardDate"></p>
            </div>
        </div>

        <div class="cards-dashboard-grid">
            
            <div class="card-kpi">
                <div class="card-kpi-info">
                    <span class="card-kpi-title">Clients Actifs</span>
                    <h2 class="card-kpi-value" id="valClients"></h2>
                    <span class="card-kpi-sub" id="subClients"></span>
                </div>
                <div class="card-kpi-side">
                    <div class="card-kpi-icon icon-blue">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <span class="trend-badge" id="trendClients"></span>
                </div>
            </div>

            <div class="card-kpi">
                <div class="card-kpi-info">
                    <span class="card-kpi-title">Commandes</span>
                    <h2 class="card-kpi-value" id="valCommandes"></h2>
                    <span class="card-kpi-sub" id="subCommandes"></span>
                </div>
                <div class="card-kpi-side">
                    <div class="card-kpi-icon icon-purple">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </div>
                    <span class="trend-badge" id="trendCommandes"></span>
                </div>
            </div>

            <div class="card-kpi">
                <div class="card-kpi-info">
                    <span class="card-kpi-title">Livraisons</span>
                    <h2 class="card-kpi-value" id="valLivraisons"></h2>
                    <span class="card-kpi-sub" id="subLivraisons"></span>
                </div>
                <div class="card-kpi-side">
                    <div class="card-kpi-icon icon-orange">
                        <i class="fa-solid fa-truck"></i>
                    </div>
                    <span class="trend-badge" id="trendLivraisons"></span>
                </div>
            </div>

            <div class="card-kpi">
                <div class="card-kpi-info">
                    <span class="card-kpi-title">Valeur Stock</span>
                    <h2 class="card-kpi-value font-mono" id="valStock"></h2>
                    <span class="card-kpi-sub" id="subStock"></span>
                </div>
                <div class="card-kpi-side">
                    <div class="card-kpi-icon icon-green">
                        <i class="fa-solid fa-box"></i>
                    </div>
                    <span class="trend-badge" id="trendStock"></span>
                </div>
            </div>

        </div>

        <div class="table-box card-table-layout">
            
            <div class="table-header flex-header">
                <h2>Commandes récentes</h2>
                <a href="#" class="btn-view-all">Voir tout</a>
            </div>

            <table class="table-dashboard">
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Client</th>
                        <th>Produit</th>
                        <th>Qté</th>
                        <th>Statut</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="commandesTableBody">
                    </tbody>
            </table>
        </div>

    </main>

</body>
</html>
